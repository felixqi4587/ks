<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>kingshoter · 礼包码</title>
<link rel="icon" href="/favicon.svg">
<link rel="stylesheet" href="app.css?v=2026071701">
<style>
  .code{display:flex;align-items:center;gap:10px;border:2px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;background:var(--paper)}
  .code .c{font:900 16px/1 var(--mono);color:var(--brown);flex:1;letter-spacing:.5px}
  .code button{border:0;background:linear-gradient(180deg,var(--mint-hi),var(--mint));color:#fff;border-radius:10px;padding:9px 14px;font:800 12px/1 var(--font);cursor:pointer;min-height:44px}
  .codes-tools{display:grid;gap:8px}.codes-note{color:var(--brown2);font-size:12.5px;line-height:1.55}.codes-status[data-tone="error"]{color:var(--coral)}
</style>
</head>
<body class="supporting-page codes-page">
<div class="wrap"><main>
  <div class="top"><div><h1 data-i18n="card_codes">礼包码查询</h1><div class="sub" data-i18n="card_codes_d">当前有效礼包码</div></div>
    <div class="clock"><span id="utc">--:--:--</span><small><span data-i18n="utc_local">UTC · 本地</span> <span id="loc">--:--:--</span></small></div></div>
  <nav class="supporting-nav" aria-label="Primary">
    <a href="/" data-i18n="nav_home">🏠 首页</a><a href="/rally" data-i18n="nav_rally">⚔️ 集结</a>
    <a href="/defense" data-i18n="nav_defense">🛡️ 防守</a><a href="/guide" data-i18n="nav_guide">📖 词汇</a>
  </nav>
  <div class="homebar" style="align-items:center;gap:9px">
    <!-- 🐟 quiet salty fish — tap it 6 times and it takes you home -->
    <span id="fishEgg" aria-hidden="true" style="display:inline-flex;color:var(--brown3);opacity:.75;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;cursor:pointer"><svg viewBox="0 0 64 48" width="26" height="19"><path d="M40 24 C40 12 22 10 12 16 C4 21 4 27 12 32 C22 38 40 36 40 24 Z" fill="currentColor"/><path d="M40 24 L58 12 L54 24 L58 36 Z" fill="currentColor"/><circle cx="20" cy="22" r="2.4" fill="var(--paper)"/></svg></span>
    <div id="langtoggle" class="langtoggle"></div>
  </div>
  <section class="card codes-tools" aria-labelledby="codesToolsTitle">
    <h2 id="codesToolsTitle" data-i18n="card_codes">礼包码查询</h2>
    <p class="codes-note" id="redeemNote"></p>
    <label class="sr-only" for="codeFilter" id="codeFilterLabel">Filter codes</label>
    <input class="supporting-control" id="codeFilter" type="search" autocomplete="off" placeholder="Filter codes" aria-labelledby="codeFilterLabel">
    <div class="supporting-status codes-status" id="codesStatus" role="status" aria-live="polite">…</div>
    <button type="button" class="btn supporting-control hide" id="retryCodes">Retry</button>
    <div id="list" aria-label="Gift codes"></div>
  </section>
  <p class="foot" data-i18n="foot">Kingshot 玩家自制工具 · 非官方 ⚔️🐟</p>
</main></div>
<div class="toast" id="toast"></div>
<script src="app.js?v=2026071701"></script>
<script>
initI18n(); startClock();
var CODES = null, CODES_ERR = false, CODE_FILTER = "";
var REDEEM = "https://ks-giftcode.centurygame.com/";
function fallbackCopy(value) {
  var field = document.createElement("textarea"); field.value = value; field.setAttribute("readonly", "");
  field.style.position = "fixed"; field.style.opacity = "0"; document.body.appendChild(field); field.select();
  var copied = false; try { copied = document.execCommand("copy") === true; } catch (e2) { copied = false; }
  document.body.removeChild(field); return copied;
}
function copyCode(value) {
  if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
    try {
      return Promise.resolve(navigator.clipboard.writeText(value)).then(
        function () { return true; },
        function () { return fallbackCopy(value); }
      );
    } catch (e) { return Promise.resolve(fallbackCopy(value)); }
  }
  return Promise.resolve(fallbackCopy(value));
}
function renderCodes() {
  var box = $("list"); if (!box) return;
  var status = $("codesStatus"), retry = $("retryCodes"), filter = $("codeFilter"), note = $("redeemNote");
  if (filter) { filter.placeholder = lang === "zh" ? "搜索礼包码" : "Filter codes"; $("codeFilterLabel").textContent = filter.placeholder; }
  if (retry) retry.textContent = lang === "zh" ? "重新加载" : "Retry";
  var all = (CODES || []).map(function (value) { return typeof value === "string" ? value : value && value.code || ""; }).filter(Boolean);
  var visible = all.filter(function (value) { return !CODE_FILTER || value.toLowerCase().indexOf(CODE_FILTER) >= 0; });
  if (note) note.textContent = lang === "zh" ? "点一下会复制礼包码并打开官方兑换页。列表每分钟更新。" : "Tap a code to copy it and open the official redeem page. The list refreshes every minute.";
  box.innerHTML = "";
  if (CODES_ERR) { status.textContent = lang === "zh" ? "⚠️ 加载失败，请重试" : "⚠️ Could not load codes. Try again."; status.dataset.tone = "error"; retry.classList.remove("hide"); return; }
  retry.classList.add("hide"); status.dataset.tone = "";
  if (CODES === null) { status.textContent = lang === "zh" ? "⏳ 正在加载礼包码…" : "⏳ Loading gift codes…"; return; }
  if (!visible.length) { status.textContent = all.length ? (lang === "zh" ? "🔎 没有匹配的礼包码" : "🔎 No matching codes") : (lang === "zh" ? "ℹ️ 暂无可用礼包码" : "ℹ️ No active codes right now"); return; }
  status.textContent = lang === "zh" ? ("🎁 " + visible.length + " 个礼包码") : ("🎁 " + visible.length + " gift code" + (visible.length === 1 ? "" : "s"));
  box.className = ""; box.innerHTML = "";
  visible.forEach(function (code) {
    var d = document.createElement("div"); d.className = "code";
    d.innerHTML = '<span class="c">' + esc(code) + '</span><button type="button" class="supporting-control">' + (lang === "zh" ? "复制并兑换 ↗" : "Copy & redeem ↗") + '</button>';
    d.querySelector("button").onclick = function () {
      window.open(REDEEM, "_blank", "noopener");
      copyCode(code).then(function (copied) {
        status.textContent = copied ? (lang === "zh" ? "✅ 已复制 " + code : "✅ Copied " + code) : (lang === "zh" ? "⚠️ 无法自动复制，请长按礼包码" : "⚠️ Copy failed; press and hold the code");
        status.dataset.tone = copied ? "" : "error";
      });
    };
    box.appendChild(d);
  });
}
window.onLangChange = renderCodes;   // re-render on language switch instead of getting wiped by applyI18n
renderCodes();
function loadCodes() { CODES_ERR = false; if (CODES === null) renderCodes(); fetch("/api/codes", { cache: "no-store" }).then(function (r) { if (!r.ok) throw new Error("codes"); return r.json(); }).then(function (o) { CODES = (o && o.codes) || []; CODES_ERR = false; renderCodes(); }).catch(function () { CODES_ERR = true; renderCodes(); }); }
loadCodes(); setInterval(loadCodes, 60000);   // auto-update: re-reads the auto-redeem tool's live codeDB every minute
$("codeFilter").addEventListener("input", function () { CODE_FILTER = this.value.toLowerCase().trim(); renderCodes(); });
$("retryCodes").addEventListener("click", loadCodes);
/* 🐟 easter egg: 6 quick taps on the fish → the hidden team page. No hint, no tooltip — you either know or you don't. */
(function () {
  var n = 0, t = null, fish = $("fishEgg"); if (!fish) return;
  fish.addEventListener("click", function () {
    n++; clearTimeout(t); t = setTimeout(function () { n = 0; }, 1600);   // taps must come in one quick run
    fish.style.transform = "rotate(" + (n * 6) + "deg)"; fish.style.transition = "transform .12s";
    if (n >= 6) { n = 0; location.href = "saltyfish.html"; }
  });
})();
</script>
</body>
</html>
