    var box = $("terms");
    TERMS.forEach(function (term) {
      var el = document.createElement("div"); el.className = "card term";
      el.innerHTML = '<h2>' + term.icon + ' ' + (L() ? term.en : term.zh) + ' <span class="en">' + (L() ? term.zh : term.en) + '</span></h2>' +
        '<div class="scene"><svg viewBox="0 0 320 130"></svg></div><div class="cap"></div>' +
        '<div class="def">' + (L() ? term.defEn : term.defZh) + '</div>';
      box.appendChild(el);
      var svg = el.querySelector("svg"), capEl = el.querySelector(".cap"), caps = L() ? term.capEn : term.capZh;
      if (!window.gsap) { capEl.textContent = caps[0]; return; }
      var play = term.build(svg), tl = null;
      var io = new IntersectionObserver(function (es) { es.forEach(function (e) { if (e.isIntersecting) { if (!tl) tl = play(capEl, caps); else tl.play(); } else if (tl) tl.pause(); }); }, { threshold: .3 });
      io.observe(el); IOS.push(io); TLS.push({ kill: function () { if (tl) tl.kill(); } });
    });
  }

  function renderAll() { clearAll(); renderLegend(); renderTerms(); }
  window.onLangChange = function () { renderHeader(); renderAll(); };
  renderHeader(); renderAll(); initI18n(); startClock();
})();
</script>
